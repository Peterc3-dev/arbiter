[node]
name = "thinkcentre"
hostname = "thinkcentre.tail"
role = "inference-hub"
description = "Always-on agent hub — persistent background automation"

[hardware]
cpu = "Intel Core i5-13500T"
ram_gb = 16
gpu = "none"
compute_backend = "cpu"

[models]
available = ["qwen2.5:7b", "phi4:mini", "deepseek-r1:14b"]
default = "qwen2.5:7b"
ollama_api = "http://localhost:11434"

[cloud_models]
kimi_2_5 = { name = "Kimi 2.5", relay = "openclaw", status = "active" }

[services]
tailscale = true
syncthing = true
ssh = true
openclaw = true
proton_vpn = true

# ─── Tool Registry ────────────────────────────────────────
# Each category declares available actions on this node.

[tools.registry.browser]
actions = ["navigate", "screenshot", "click", "extract"]
description = "Browser automation via OpenClaw Chrome relay"
requires_network = true
permission = "local"

[tools.registry.file]
actions = ["read", "write", "search", "list", "delete"]
description = "Filesystem operations"
permission = "local"

[tools.registry.code]
actions = ["execute", "lint", "test"]
description = "Code execution and validation"
permission = "local"

[tools.registry.ollama]
actions = ["generate", "chat", "embed", "list_models", "pull"]
description = "Local LLM inference via Ollama API"
permission = "local"

[tools.registry.system]
actions = ["health", "uptime", "disk", "processes"]
description = "System monitoring and diagnostics"
permission = "local"

[tools.registry.kimi]
actions = ["chat", "reason"]
description = "Kimi 2.5 cloud model via OpenClaw relay"
requires_network = true
permission = "cloud"
