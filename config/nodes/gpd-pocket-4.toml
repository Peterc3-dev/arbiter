[node]
name = "gpd-pocket-4"
hostname = "gpd.tail"
role = "dev-workstation"
description = "Active development workstation — Claude Code, hands-on work"

[hardware]
cpu = "AMD Ryzen AI 9 HX 370"
ram_gb = 32
gpu = "AMD Radeon 890M (iGPU)"
gpu_arch = "gfx1150"
compute_backend = "vulkan"
compute_notes = "ROCm no native gfx1150 support — use OLLAMA_VULKAN=1"

[models]
available = []
default = ""
ollama_api = "http://localhost:11434"
notes = "Primary LLM work migrated to ThinkCentre; GPU for inference-appliance future phase"

[tools]
claude_code = true

[services]
tailscale = true
syncthing = true
ssh = true

# ─── Tool Registry ────────────────────────────────────────

[tools.registry.claude_code]
actions = ["generate", "edit", "refactor", "explain", "test"]
description = "Agentic AI coding via Claude Code CLI"
permission = "local"

[tools.registry.file]
actions = ["read", "write", "search", "list", "delete"]
description = "Filesystem operations"
permission = "local"

[tools.registry.code]
actions = ["execute", "lint", "test"]
description = "Code execution and validation"
permission = "local"

[tools.registry.git]
actions = ["commit", "push", "pull", "branch", "status", "log"]
description = "Git version control operations"
permission = "local"

[tools.registry.github]
actions = ["create_repo", "push", "issues", "pr"]
description = "GitHub operations via gh CLI"
requires_network = true
permission = "cloud"

[tools.registry.system]
actions = ["health", "uptime", "disk", "processes"]
description = "System monitoring and diagnostics"
permission = "local"
